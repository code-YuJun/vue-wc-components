<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试入口 JS</title>
    <script src="./index.js" data-components="demoone,demotwo"></script>
</head>

<body>
    <div>测试入口 JS</div>
    <div>使用自定义元素</div>
    <!--
        如果不关注组件的加载时序，多用于展示类组件
        demoone-extension 未注册时,是一个 HTMLUnknownElement 
        customElements.define() 之后 → 自动 upgrade（升级）
        upgrade 是异步但可靠的，可以先写 DOM，再注册组件，是安全的
    -->
    <demoone-extension></demoone-extension>
    <demotwo-extension></demotwo-extension>

    <!-- 需要关注组件是否注册完毕，用于给组件传递参数的情况 -->
    <!-- 先监听，后加载 -->
    <script>
        window.addEventListener("extension-ready", (event) => {
            const { loadedComponents } = event.detail;
            console.log("JDM Runtime 准备就绪！已加载组件：", loadedComponents);
        });
    </script>
    <!-- <script src="./index.js" data-components="demoone,demotwo"></script> -->
</body>

</html>
